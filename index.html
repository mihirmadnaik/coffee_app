<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Coffee Diary</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coffee Diary">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#182635">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #182635;
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    #root { display: flex; flex-direction: column; }
    .scroll-y { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .scroll-y::-webkit-scrollbar { display: none; }
    input, textarea {
      background: none; border: none; outline: none;
      font-family: 'DM Mono', monospace; font-weight: 300;
      width: 100%; -webkit-appearance: none;
    }
    textarea { resize: none; }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .slide-up { animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1) forwards; }
    .fade-in  { animation: fadeIn  0.2s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

// ── Palette ───────────────────────────────────────────────────────────────────
const P = {
  bg:         '#182635',
  bgDeep:     '#0F1C29',
  darkStroke: 'rgba(220,205,180,0.20)',
  headerText: '#D8CAB4',
  headerMuted:'#7A94A8',
  cardBg:     'rgba(220,205,180,0.10)',
  cardBg2:    'rgba(220,205,180,0.17)',
  cardStroke: 'rgba(220,205,180,0.20)',
  cardDark:   '#D8CAB4',
  cardMuted:  '#7A94A8',
  cafe:       '#D4976A',
  brew:       '#7A9AB0',
};

const G = {
  surface:    '#2a3d50',
  border:     'rgba(240,228,204,0.12)',
  label:      '#5a7a8a',
  text:       '#d8c8a8',
  placeholder:'#5a7a8a',
  chipBorder: 'rgba(240,228,204,0.25)',
};

// ── Utils ─────────────────────────────────────────────────────────────────────
function genId() { return Math.random().toString(36).slice(2,10); }

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
}
function groupByDate(entries) {
  const map = {};
  entries.forEach(e => {
    const day = e.date.slice(0,10);
    if (!map[day]) map[day] = [];
    map[day].push(e);
  });
  return Object.entries(map)
    .sort(([a],[b]) => b.localeCompare(a))
    .map(([day, items]) => ({
      label: formatDate(day + 'T12:00:00'),
      entries: items.sort((a,b) => b.date.localeCompare(a.date))
    }));
}
function getMonthName() {
  return new Date().toLocaleDateString('en-US', { month: 'long' });
}
function getMonthCount(entries) {
  const n = new Date();
  return entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
  }).length;
}

// ── localStorage hook ─────────────────────────────────────────────────────────
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const set = useCallback(v => {
    setVal(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  }, [key]);
  return [val, set];
}

// ── Shared primitives ────────────────────────────────────────────────────────

function RatingSquares({ n=0, size=18, onChange }) {
  return (
    <div style={{ display:'flex', gap:5 }}>
      {[1,2,3,4,5].map(i => (
        <div key={i} onClick={() => onChange && onChange(i===n ? 0 : i)}
          style={{ width:size, height:size, borderRadius:4,
            background: i<=n ? P.cafe : G.surface,
            border:'0.5px solid '+(i<=n ? P.cafe : G.chipBorder),
            cursor: onChange ? 'pointer' : 'default', transition:'background 0.15s' }} />
      ))}
    </div>
  );
}

function RatingDots({ n=0, max=5 }) {
  return (
    <div style={{ display:'flex', gap:3 }}>
      {Array.from({length:max},(_,i) => (
        <div key={i} style={{ width:6, height:6, borderRadius:'50%',
          background: i<n ? P.cafe : P.headerMuted, opacity: i<n ? 1 : 0.35 }} />
      ))}
    </div>
  );
}

function GhostChip({ label, active, onPress }) {
  return (
    <div onClick={onPress} style={{ padding:'5px 13px', borderRadius:20, fontSize:10,
      cursor:'pointer', fontFamily:'DM Mono, monospace', fontWeight:300,
      letterSpacing:'0.02em', whiteSpace:'nowrap',
      background: active ? P.cafe : 'transparent',
      color: active ? '#f0e4cc' : G.text,
      border:'1px solid '+(active ? P.cafe : G.chipBorder),
      transition:'all 0.15s' }}>
      {label}
    </div>
  );
}

function GhostField({ label, placeholder, value, onChange, multiline, height=42 }) {
  return (
    <div style={{ marginBottom:12 }}>
      {label && <div style={{ fontSize:8.5, color:G.label, fontFamily:'DM Mono, monospace',
        marginBottom:5, letterSpacing:'0.1em', textTransform:'uppercase' }}>{label}</div>}
      <div style={{ height:multiline?undefined:height, minHeight:multiline?60:undefined,
        background:G.surface, border:'1px solid '+G.border, borderRadius:10,
        display:'flex', alignItems:multiline?'flex-start':'center',
        padding:multiline?'11px 14px':'0 14px' }}>
        {multiline
          ? <textarea placeholder={placeholder} value={value||''} rows={3}
              onChange={e => onChange && onChange(e.target.value)}
              style={{ color:G.text, fontSize:12, lineHeight:1.5 }} />
          : <input type="text" placeholder={placeholder} value={value||''}
              onChange={e => onChange && onChange(e.target.value)}
              style={{ color:G.text, fontSize:12 }} />
        }
      </div>
    </div>
  );
}

function SectionHead({ label }) {
  return (
    <div style={{ fontFamily:'Cormorant Garamond, serif', fontSize:15, fontWeight:500,
      color:'#8a9aaa', letterSpacing:'0.04em', marginBottom:6, marginTop:4 }}>{label}</div>
  );
}

function FormDivider() {
  return <div style={{ height:'0.5px', background:'rgba(208,228,244,0.12)', margin:'6px 0 10px' }} />;
}

function NavBar({ title, onBack, onSave }) {
  return (
    <div style={{ padding:'8px 16px', display:'flex', justifyContent:'space-between',
      alignItems:'center', borderBottom:'0.5px solid rgba(240,228,204,0.15)',
      background:P.bg, flexShrink:0,
      paddingTop:'calc(8px + env(safe-area-inset-top))' }}>
      <div onClick={onBack} style={{ fontSize:11, color:P.cafe, cursor:'pointer', padding:'4px 0' }}>← Back</div>
      <div style={{ fontSize:13, fontWeight:500, color:G.text,
        fontFamily:'Cormorant Garamond, serif', letterSpacing:'0.04em' }}>{title}</div>
      <div onClick={onSave} style={{ fontSize:11, color:P.cafe, fontWeight:600, cursor:'pointer', padding:'4px 0' }}>Save</div>
    </div>
  );
}

function TabBar({ active, onTab, onAdd }) {
  const tabs = [{label:'HOME',i:0},{label:'BEANS',i:1},null,{label:'STATS',i:3},{label:'PROFILE',i:4}];
  return (
    <div style={{ height:58, background:P.bg, borderTop:'0.5px solid '+P.darkStroke,
      display:'flex', alignItems:'center', flexShrink:0, padding:'0 8px',
      paddingBottom:'env(safe-area-inset-bottom)' }}>
      {tabs.map((tab,i) => {
        if (!tab) return (
          <div key={i} style={{ flex:1, display:'flex', justifyContent:'center' }}>
            <div onClick={onAdd} style={{ width:46, height:46, borderRadius:'50%', background:P.cafe,
              boxShadow:'0 4px 14px rgba(212,151,106,0.35)',
              display:'flex', alignItems:'center', justifyContent:'center',
              marginBottom:14, cursor:'pointer' }}>
              <div style={{ fontSize:24, color:'#182635', lineHeight:1, fontWeight:300, marginTop:-2 }}>+</div>
            </div>
          </div>
        );
        const on = tab.i === active;
        return (
          <div key={i} onClick={() => onTab(tab.i)} style={{ flex:1, display:'flex',
            flexDirection:'column', alignItems:'center', justifyContent:'center',
            gap:4, paddingTop:4, cursor:'pointer' }}>
            <div style={{ width:6, height:6, borderRadius:'50%',
              background: on ? P.cafe : P.headerMuted, opacity: on?1:0.4 }} />
            <span style={{ fontSize:8, color: on?P.cafe:P.headerMuted,
              fontFamily:'DM Mono, monospace', letterSpacing:'0.06em',
              textTransform:'uppercase', fontWeight: on?400:300 }}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function MiniCalendar({ entries, onClose }) {
  const now = new Date();
  const yr = now.getFullYear(), mo = now.getMonth();
  const loggedDays = new Set(
    entries.filter(e => { const d=new Date(e.date); return d.getMonth()===mo && d.getFullYear()===yr; })
           .map(e => new Date(e.date).getDate())
  );
  const firstDay = new Date(yr,mo,1).getDay();
  const daysInMonth = new Date(yr,mo+1,0).getDate();
  const today = now.getDate();
  const offset = (firstDay+6)%7;
  const cells = [...Array(offset).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while (cells.length%7) cells.push(null);
  const weeks = Array.from({length:cells.length/7},(_,i)=>cells.slice(i*7,i*7+7));
  const monthLabel = now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  return (
    <div style={{ background:P.cardBg2, border:'0.5px solid '+P.cardStroke,
      borderRadius:14, padding:'10px 12px', marginBottom:8 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
        <span style={{ fontSize:11, fontWeight:600, color:P.cardDark, fontFamily:'Cormorant Garamond, serif' }}>{monthLabel}</span>
        <span onClick={onClose} style={{ fontSize:9, color:P.cafe, cursor:'pointer', fontWeight:600 }}>Done</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:1, marginBottom:3 }}>
        {['M','T','W','T','F','S','S'].map((d,i)=>(
          <div key={i} style={{ textAlign:'center', fontSize:7, color:P.cardMuted, paddingBottom:2 }}>{d}</div>
        ))}
      </div>
      {weeks.map((week,wi)=>(
        <div key={wi} style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:1, marginBottom:1 }}>
          {week.map((d,di)=>(
            <div key={di} style={{ height:22, display:'flex', alignItems:'center', justifyContent:'center' }}>
              {d && (
                <div style={{ width:20, height:20, borderRadius:'50%',
                  background: d===today ? P.cafe : loggedDays.has(d) ? P.brew+'40' : 'transparent',
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <span style={{ fontSize:8, color: d===today?'#fff':P.cardDark,
                    fontWeight: loggedDays.has(d)?600:400 }}>{d}</span>
                </div>
              )}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ── Home Screen ───────────────────────────────────────────────────────────────
function HomeScreen({ entries, onTab, onAdd }) {
  const [calOpen, setCalOpen] = useState(false);
  const groups = groupByDate(entries);
  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden' }}>
      <div style={{ padding:'10px 16px 12px', background:P.bg,
        paddingTop:'calc(10px + env(safe-area-inset-top))',
        display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontSize:28, fontWeight:500, fontStyle:'italic',
            color:P.headerText, fontFamily:'Cormorant Garamond, serif', lineHeight:1 }}>
            {getMonthName()}
          </div>
          <div style={{ fontSize:8.5, color:P.headerMuted, marginTop:3,
            fontFamily:'DM Mono, monospace', fontWeight:300 }}>
            {getMonthCount(entries)} coffee{getMonthCount(entries)!==1?'s':''} this month
          </div>
        </div>
        <div onClick={() => setCalOpen(o=>!o)} style={{ paddingTop:4, cursor:'pointer' }}>
          <div style={{ width:28, height:28,
            border:'1.5px solid '+(calOpen?P.cafe:P.headerMuted),
            borderRadius:5, display:'flex', flexDirection:'column', overflow:'hidden' }}>
            <div style={{ height:8, background:calOpen?P.cafe:P.headerMuted,
              display:'flex', alignItems:'center', justifyContent:'space-around', padding:'0 3px' }}>
              <div style={{ width:2, height:5, background:P.bg+'cc', borderRadius:1, marginTop:-2 }} />
              <div style={{ width:2, height:5, background:P.bg+'cc', borderRadius:1, marginTop:-2 }} />
            </div>
            <div style={{ flex:1, display:'grid', gridTemplateColumns:'repeat(3,1fr)',
              gap:1.5, padding:'2px 3px' }}>
              {Array(6).fill(0).map((_,i)=>(
                <div key={i} style={{ height:3, borderRadius:0.5,
                  background:(calOpen?P.cafe:P.headerMuted)+(i===5?'':'40') }} />
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="scroll-y" style={{ flex:1, padding:'0 14px' }}>
        {calOpen && <MiniCalendar entries={entries} onClose={()=>setCalOpen(false)} />}

        {!calOpen && groups.length===0 && (
          <div style={{ textAlign:'center', padding:'60px 20px',
            color:P.headerMuted, fontFamily:'DM Mono, monospace', fontSize:12, fontWeight:300 }}>
            <div style={{ fontSize:36, marginBottom:14 }}>☕</div>
            <div>No entries yet.</div>
            <div style={{ marginTop:6, fontSize:10 }}>Tap + to log your first coffee.</div>
          </div>
        )}

        {!calOpen && groups.map((g,gi)=>(
          <div key={gi}>
            <div style={{ display:'flex', alignItems:'center', gap:7, padding:'10px 0 6px' }}>
              <span style={{ fontSize:8, color:P.headerMuted, fontFamily:'DM Mono, monospace',
                letterSpacing:'0.1em', flexShrink:0 }}>{g.label.toUpperCase()}</span>
              <div style={{ flex:1, height:'0.5px', background:P.darkStroke }} />
            </div>
            {g.entries.map((e,ei)=>(
              <div key={ei} style={{ display:'flex', alignItems:'center',
                marginBottom:6, background:P.cardBg,
                border:'0.5px solid '+P.cardStroke, borderRadius:10, overflow:'hidden' }}>
                <div style={{ width:4, alignSelf:'stretch', flexShrink:0,
                  background: e.type==='cafe' ? P.cafe : P.brew }} />
                <div style={{ flex:1, padding:'10px 12px', display:'flex', alignItems:'center', gap:8 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:500, color:P.headerText,
                      fontFamily:'Cormorant Garamond, serif', letterSpacing:'0.01em' }}>
                      {e.type==='cafe' ? (e.cafeName||'Unnamed Café') : (e.beanName||'Unnamed Brew')}
                    </div>
                    <div style={{ fontSize:8.5, color:P.headerMuted,
                      fontFamily:'DM Mono, monospace', fontWeight:300, marginTop:2 }}>
                      {formatTime(e.date)}
                    </div>
                  </div>
                  <div style={{ flexShrink:0, textAlign:'right' }}>
                    <span style={{ fontSize:9, fontFamily:'DM Mono, monospace',
                      color: e.type==='cafe' ? P.cafe : P.brew }}>
                      {e.type==='cafe' ? (e.drinkType||'Café') : (e.method||'Brew')}
                    </span>
                    {e.rating>0 && <div style={{ marginTop:3 }}><RatingDots n={e.rating} /></div>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        ))}
        <div style={{ height:16 }} />
      </div>

      <TabBar active={0} onTab={onTab} onAdd={onAdd} />
    </div>
  );
}

// CHUNK_4_GOES_HERE
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
