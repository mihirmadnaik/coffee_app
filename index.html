<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Coffee Diary</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coffee Diary">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#182635">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #182635;
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    #root { display: flex; flex-direction: column; }
    .scroll-y { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .scroll-y::-webkit-scrollbar { display: none; }
    input, textarea {
      background: none; border: none; outline: none;
      font-family: 'DM Mono', monospace; font-weight: 300;
      width: 100%; -webkit-appearance: none;
    }
    textarea { resize: none; }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .slide-up { animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1) forwards; }
    .fade-in  { animation: fadeIn  0.2s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef } = React;

// ── Palette ───────────────────────────────────────────────────────────────────
const P = {
  bg:         '#182635',
  bgDeep:     '#0F1C29',
  darkStroke: 'rgba(220,205,180,0.20)',
  headerText: '#D8CAB4',
  headerMuted:'#7A94A8',
  cardBg:     'rgba(220,205,180,0.10)',
  cardBg2:    'rgba(220,205,180,0.17)',
  cardStroke: 'rgba(220,205,180,0.20)',
  cardDark:   '#D8CAB4',
  cardMuted:  '#7A94A8',
  cafe:       '#D4976A',
  brew:       '#7A9AB0',
};

const G = {
  surface:    '#2a3d50',
  border:     'rgba(240,228,204,0.12)',
  label:      '#5a7a8a',
  text:       '#d8c8a8',
  placeholder:'#5a7a8a',
  chipBorder: 'rgba(240,228,204,0.25)',
};

// ── Utils ─────────────────────────────────────────────────────────────────────
function genId() { return Math.random().toString(36).slice(2,10); }

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
}
function groupByDate(entries) {
  const map = {};
  entries.forEach(e => {
    const day = e.date.slice(0,10);
    if (!map[day]) map[day] = [];
    map[day].push(e);
  });
  return Object.entries(map)
    .sort(([a],[b]) => b.localeCompare(a))
    .map(([day, items]) => ({
      label: formatDate(day + 'T12:00:00'),
      entries: items.sort((a,b) => b.date.localeCompare(a.date))
    }));
}
function getMonthName() {
  return new Date().toLocaleDateString('en-US', { month: 'long' });
}
function getMonthCount(entries) {
  const n = new Date();
  return entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
  }).length;
}

// ── localStorage hook ─────────────────────────────────────────────────────────
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const set = useCallback(v => {
    setVal(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  }, [key]);
  return [val, set];
}

// ── Shared primitives ────────────────────────────────────────────────────────

function RatingSquares({ n=0, size=18, onChange }) {
  return (
    <div style={{ display:'flex', gap:5 }}>
      {[1,2,3,4,5].map(i => (
        <div key={i} onClick={() => onChange && onChange(i===n ? 0 : i)}
          style={{ width:size, height:size, borderRadius:4,
            background: i<=n ? P.cafe : G.surface,
            border:'0.5px solid '+(i<=n ? P.cafe : G.chipBorder),
            cursor: onChange ? 'pointer' : 'default', transition:'background 0.15s' }} />
      ))}
    </div>
  );
}

function RatingDots({ n=0, max=5 }) {
  return (
    <div style={{ display:'flex', gap:3 }}>
      {Array.from({length:max},(_,i) => (
        <div key={i} style={{ width:6, height:6, borderRadius:'50%',
          background: i<n ? P.cafe : P.headerMuted, opacity: i<n ? 1 : 0.35 }} />
      ))}
    </div>
  );
}

function GhostChip({ label, active, onPress }) {
  return (
    <div onClick={onPress} style={{ padding:'5px 13px', borderRadius:20, fontSize:10,
      cursor:'pointer', fontFamily:'DM Mono, monospace', fontWeight:300,
      letterSpacing:'0.02em', whiteSpace:'nowrap',
      background: active ? P.cafe : 'transparent',
      color: active ? '#f0e4cc' : G.text,
      border:'1px solid '+(active ? P.cafe : G.chipBorder),
      transition:'all 0.15s' }}>
      {label}
    </div>
  );
}

function GhostField({ label, placeholder, value, onChange, multiline, height=42 }) {
  return (
    <div style={{ marginBottom:12 }}>
      {label && <div style={{ fontSize:8.5, color:G.label, fontFamily:'DM Mono, monospace',
        marginBottom:5, letterSpacing:'0.1em', textTransform:'uppercase' }}>{label}</div>}
      <div style={{ height:multiline?undefined:height, minHeight:multiline?60:undefined,
        background:G.surface, border:'1px solid '+G.border, borderRadius:10,
        display:'flex', alignItems:multiline?'flex-start':'center',
        padding:multiline?'11px 14px':'0 14px' }}>
        {multiline
          ? <textarea placeholder={placeholder} value={value||''} rows={3}
              onChange={e => onChange && onChange(e.target.value)}
              style={{ color:G.text, fontSize:12, lineHeight:1.5 }} />
          : <input type="text" placeholder={placeholder} value={value||''}
              onChange={e => onChange && onChange(e.target.value)}
              style={{ color:G.text, fontSize:12 }} />
        }
      </div>
    </div>
  );
}

function SectionHead({ label }) {
  return (
    <div style={{ fontFamily:'Cormorant Garamond, serif', fontSize:15, fontWeight:500,
      color:'#8a9aaa', letterSpacing:'0.04em', marginBottom:6, marginTop:4 }}>{label}</div>
  );
}

function FormDivider() {
  return <div style={{ height:'0.5px', background:'rgba(208,228,244,0.12)', margin:'6px 0 10px' }} />;
}

function NavBar({ title, onBack, onSave }) {
  return (
    <div style={{ padding:'8px 16px', display:'flex', justifyContent:'space-between',
      alignItems:'center', borderBottom:'0.5px solid rgba(240,228,204,0.15)',
      background:P.bg, flexShrink:0,
      paddingTop:'calc(8px + env(safe-area-inset-top))' }}>
      <div onClick={onBack} style={{ fontSize:11, color:P.cafe, cursor:'pointer', padding:'4px 0' }}>← Back</div>
      <div style={{ fontSize:13, fontWeight:500, color:G.text,
        fontFamily:'Cormorant Garamond, serif', letterSpacing:'0.04em' }}>{title}</div>
      <div onClick={onSave} style={{ fontSize:11, color:P.cafe, fontWeight:600, cursor:'pointer', padding:'4px 0' }}>Save</div>
    </div>
  );
}

function TabBar({ active, onTab, onAdd }) {
  const tabs = [{label:'HOME',i:0},{label:'BEANS',i:1},null,{label:'STATS',i:3},{label:'PROFILE',i:4}];
  return (
    <div style={{ height:58, background:P.bg, borderTop:'0.5px solid '+P.darkStroke,
      display:'flex', alignItems:'center', flexShrink:0, padding:'0 8px',
      paddingBottom:'env(safe-area-inset-bottom)' }}>
      {tabs.map((tab,i) => {
        if (!tab) return (
          <div key={i} style={{ flex:1, display:'flex', justifyContent:'center' }}>
            <div onClick={onAdd} style={{ width:46, height:46, borderRadius:'50%', background:P.cafe,
              boxShadow:'0 4px 14px rgba(212,151,106,0.35)',
              display:'flex', alignItems:'center', justifyContent:'center',
              marginBottom:14, cursor:'pointer' }}>
              <div style={{ fontSize:24, color:'#182635', lineHeight:1, fontWeight:300, marginTop:-2 }}>+</div>
            </div>
          </div>
        );
        const on = tab.i === active;
        return (
          <div key={i} onClick={() => onTab(tab.i)} style={{ flex:1, display:'flex',
            flexDirection:'column', alignItems:'center', justifyContent:'center',
            gap:4, paddingTop:4, cursor:'pointer' }}>
            <div style={{ width:6, height:6, borderRadius:'50%',
              background: on ? P.cafe : P.headerMuted, opacity: on?1:0.4 }} />
            <span style={{ fontSize:8, color: on?P.cafe:P.headerMuted,
              fontFamily:'DM Mono, monospace', letterSpacing:'0.06em',
              textTransform:'uppercase', fontWeight: on?400:300 }}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function MiniCalendar({ entries, onClose, onDaySelect, selectedDay }) {
  const now = new Date();
  const yr = now.getFullYear(), mo = now.getMonth();
  const pad = n => String(n).padStart(2,'0');
  const loggedDays = new Set(
    entries.filter(e => { const d=new Date(e.date); return d.getMonth()===mo && d.getFullYear()===yr; })
           .map(e => new Date(e.date).getDate())
  );
  const firstDay = new Date(yr,mo,1).getDay();
  const daysInMonth = new Date(yr,mo+1,0).getDate();
  const today = now.getDate();
  const offset = (firstDay+6)%7;
  const cells = [...Array(offset).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while (cells.length%7) cells.push(null);
  const weeks = Array.from({length:cells.length/7},(_,i)=>cells.slice(i*7,i*7+7));
  const monthLabel = now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const selDate = selectedDay ? new Date(selectedDay+'T12:00:00').getDate() : null;
  return (
    <div style={{ background:P.cardBg2, border:'0.5px solid '+P.cardStroke,
      borderRadius:14, padding:'10px 12px', marginBottom:8 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
        <span style={{ fontSize:11, fontWeight:600, color:P.cardDark, fontFamily:'Cormorant Garamond, serif' }}>{monthLabel}</span>
        <span onClick={onClose} style={{ fontSize:9, color:P.cafe, cursor:'pointer', fontWeight:600 }}>Done</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:1, marginBottom:3 }}>
        {['M','T','W','T','F','S','S'].map((d,i)=>(
          <div key={i} style={{ textAlign:'center', fontSize:7, color:P.cardMuted, paddingBottom:2 }}>{d}</div>
        ))}
      </div>
      {weeks.map((week,wi)=>(
        <div key={wi} style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:1, marginBottom:1 }}>
          {week.map((d,di)=>{
            const dayKey = d ? `${yr}-${pad(mo+1)}-${pad(d)}` : null;
            const isSelected = d && selDate===d;
            const isToday = d===today;
            const hasEntry = d && loggedDays.has(d);
            return (
              <div key={di} onClick={()=> d && onDaySelect && onDaySelect(dayKey)}
                style={{ height:26, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', cursor: d?'pointer':'default' }}>
                {d && (
                  <>
                    <div style={{ width:20, height:20, borderRadius:'50%',
                      background: isSelected ? P.cafe : isToday ? P.cafe+'55' : 'transparent',
                      display:'flex', alignItems:'center', justifyContent:'center' }}>
                      <span style={{ fontSize:8, color: isSelected?'#fff':P.cardDark,
                        fontWeight: hasEntry?600:400 }}>{d}</span>
                    </div>
                    <div style={{ width:4, height:4, borderRadius:'50%', marginTop:1,
                      background: hasEntry ? P.brew : 'transparent' }} />
                  </>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ── Home Screen ───────────────────────────────────────────────────────────────
function HomeScreen({ entries, onTab, onAdd, onEntryPress }) {
  const [calOpen, setCalOpen] = useState(false);
  const [filterDay, setFilterDay] = useState(null);
  const handleDaySelect = day => { setFilterDay(day); setCalOpen(false); };
  const displayEntries = filterDay ? entries.filter(e=>e.date.startsWith(filterDay)) : entries;
  const groups = groupByDate(displayEntries);
  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden' }}>
      <div style={{ padding:'10px 16px 12px', background:P.bg,
        paddingTop:'calc(10px + env(safe-area-inset-top))',
        display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontSize:28, fontWeight:500, fontStyle:'italic',
            color:P.headerText, fontFamily:'Cormorant Garamond, serif', lineHeight:1 }}>
            {getMonthName()}
          </div>
          <div style={{ fontSize:8.5, color:P.headerMuted, marginTop:3,
            fontFamily:'DM Mono, monospace', fontWeight:300 }}>
            {getMonthCount(entries)} coffee{getMonthCount(entries)!==1?'s':''} this month
          </div>
        </div>
        <div onClick={() => setCalOpen(o=>!o)} style={{ paddingTop:4, cursor:'pointer' }}>
          <div style={{ width:28, height:28,
            border:'1.5px solid '+(calOpen?P.cafe:P.headerMuted),
            borderRadius:5, display:'flex', flexDirection:'column', overflow:'hidden' }}>
            <div style={{ height:8, background:calOpen?P.cafe:P.headerMuted,
              display:'flex', alignItems:'center', justifyContent:'space-around', padding:'0 3px' }}>
              <div style={{ width:2, height:5, background:P.bg+'cc', borderRadius:1, marginTop:-2 }} />
              <div style={{ width:2, height:5, background:P.bg+'cc', borderRadius:1, marginTop:-2 }} />
            </div>
            <div style={{ flex:1, display:'grid', gridTemplateColumns:'repeat(3,1fr)',
              gap:1.5, padding:'2px 3px' }}>
              {Array(6).fill(0).map((_,i)=>(
                <div key={i} style={{ height:3, borderRadius:0.5,
                  background:(calOpen?P.cafe:P.headerMuted)+(i===5?'':'40') }} />
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="scroll-y" style={{ flex:1, padding:'0 14px' }}>
        {calOpen && <MiniCalendar entries={entries} onClose={()=>setCalOpen(false)}
          onDaySelect={handleDaySelect} selectedDay={filterDay} />}

        {filterDay && !calOpen && (
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'4px 0 10px' }}>
            <span style={{ fontSize:10, color:P.cafe, fontFamily:'DM Mono, monospace', fontWeight:400 }}>
              {new Date(filterDay+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
            </span>
            <span onClick={()=>setFilterDay(null)} style={{ fontSize:10, color:P.headerMuted, fontFamily:'DM Mono, monospace', cursor:'pointer' }}>clear ×</span>
          </div>
        )}

        {!calOpen && groups.length===0 && (
          <div style={{ textAlign:'center', padding:'60px 20px',
            color:P.headerMuted, fontFamily:'DM Mono, monospace', fontSize:12, fontWeight:300 }}>
            <div style={{ fontSize:36, marginBottom:14 }}>☕</div>
            <div>No entries yet.</div>
            <div style={{ marginTop:6, fontSize:10 }}>Tap + to log your first coffee.</div>
          </div>
        )}

        {!calOpen && groups.map((g,gi)=>(
          <div key={gi}>
            <div style={{ display:'flex', alignItems:'center', gap:7, padding:'10px 0 6px' }}>
              <span style={{ fontSize:8, color:P.headerMuted, fontFamily:'DM Mono, monospace',
                letterSpacing:'0.1em', flexShrink:0 }}>{g.label.toUpperCase()}</span>
              <div style={{ flex:1, height:'0.5px', background:P.darkStroke }} />
            </div>
            {g.entries.map((e,ei)=>(
              <div key={ei} onClick={()=>onEntryPress&&onEntryPress(e)}
                style={{ display:'flex', alignItems:'center',
                marginBottom:6, background:P.cardBg, cursor:'pointer',
                border:'0.5px solid '+P.cardStroke, borderRadius:10, overflow:'hidden' }}>
                <div style={{ width:4, alignSelf:'stretch', flexShrink:0,
                  background: e.type==='cafe' ? P.cafe : P.brew }} />
                <div style={{ flex:1, padding:'10px 12px', display:'flex', alignItems:'center', gap:8 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:500, color:P.headerText,
                      fontFamily:'Cormorant Garamond, serif', letterSpacing:'0.01em' }}>
                      {e.type==='cafe' ? (e.cafeName||'Unnamed Café') : (e.beanName||'Unnamed Brew')}
                    </div>
                    <div style={{ fontSize:8.5, color:P.headerMuted,
                      fontFamily:'DM Mono, monospace', fontWeight:300, marginTop:2 }}>
                      {formatTime(e.date)}
                    </div>
                  </div>
                  <div style={{ flexShrink:0, textAlign:'right' }}>
                    <span style={{ fontSize:9, fontFamily:'DM Mono, monospace',
                      color: e.type==='cafe' ? P.cafe : P.brew }}>
                      {e.type==='cafe' ? (e.drinkType||'Café') : (e.method||'Brew')}
                    </span>
                    {e.rating>0 && <div style={{ marginTop:3 }}><RatingDots n={e.rating} /></div>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        ))}
        <div style={{ height:16 }} />
      </div>

      <TabBar active={0} onTab={onTab} onAdd={onAdd} />
    </div>
  );
}

// ── Quick Capture Sheet ───────────────────────────────────────────────────────
const TASTING_NOTES = ['Fruity','Floral','Nutty','Chocolatey','Bright','Smoky','Sweet','Clean'];
const BREW_METHODS  = ['V60','Espresso','Chemex','Aeropress','French Press','Moka Pot'];
const VIBE_TAGS     = ['Cozy','Busy','Quiet','Specialty','Work-friendly'];

function QuickCaptureSheet({ onClose, onSave, onExpand }) {
  const [type, setType]         = useState('cafe');
  const [cafeName, setCafeName] = useState('');
  const [drinkType, setDrink]   = useState('');
  const [beanName, setBean]     = useState('');
  const [method, setMethod]     = useState('');
  const [rating, setRating]     = useState(0);

  const handleSave = () => {
    const base = { id:genId(), date:new Date().toISOString(), type, rating, tastingNotes:[], notes:'' };
    const entry = type==='cafe'
      ? { ...base, cafeName, drinkType, location:'', bean:'', price:'',
          ratings:{overall:rating,aroma:0,taste:0,texture:0}, vibeTags:[], wouldVisitAgain:false }
      : { ...base, beanName, method, roaster:'', dose:'', water:'', temp:'',
          brewTime:'', grindSize:'', ratio:'', whatIdChange:'', recipe:'' };
    onSave(entry);
  };

  const fieldStyle = { height:42, background:G.surface, border:'1px solid '+G.border,
    borderRadius:10, display:'flex', alignItems:'center', padding:'0 14px' };
  const labelStyle = { fontSize:8.5, color:P.cardMuted, fontFamily:'DM Mono, monospace',
    marginBottom:5, letterSpacing:'0.1em', textTransform:'uppercase' };

  return (
    <div style={{ position:'fixed', inset:0, zIndex:100, display:'flex', flexDirection:'column', justifyContent:'flex-end' }}>
      <div className="fade-in" onClick={onClose}
        style={{ position:'absolute', inset:0, background:'rgba(10,18,26,0.7)' }} />
      <div className="slide-up" style={{ position:'relative', zIndex:1,
        background:'rgba(24,38,53,0.97)', borderRadius:'20px 20px 0 0',
        border:'0.5px solid '+P.cardStroke, borderBottom:'none',
        padding:'0 16px', paddingBottom:'env(safe-area-inset-bottom)' }}>
        <div style={{ width:36, height:3, background:P.cardStroke, borderRadius:3, margin:'10px auto 14px' }} />
        <div style={{ display:'flex', gap:8, marginBottom:16 }}>
          {[['cafe','Café Visit'],['brew','Home Brew']].map(([val,lbl])=>(
            <div key={val} onClick={()=>setType(val)} style={{ padding:'6px 16px', borderRadius:20,
              fontSize:11, cursor:'pointer', fontFamily:'DM Mono, monospace', fontWeight:300,
              background: type===val ? P.cafe : 'transparent',
              color: type===val ? '#f0e4cc' : P.cardMuted,
              border:'1px solid '+(type===val ? P.cafe : P.cardStroke), transition:'all 0.15s' }}>
              {lbl}
            </div>
          ))}
        </div>
        {type==='cafe' ? (
          <>
            <div style={{ marginBottom:10 }}>
              <div style={labelStyle}>Café Name</div>
              <div style={fieldStyle}><input placeholder="Where did you go?" value={cafeName} onChange={e=>setCafeName(e.target.value)} style={{ fontSize:13, color:G.text }} /></div>
            </div>
            <div style={{ marginBottom:10 }}>
              <div style={labelStyle}>Drink</div>
              <div style={fieldStyle}><input placeholder="Flat White, Latte…" value={drinkType} onChange={e=>setDrink(e.target.value)} style={{ fontSize:13, color:G.text }} /></div>
            </div>
          </>
        ) : (
          <>
            <div style={{ marginBottom:10 }}>
              <div style={labelStyle}>Bean Name</div>
              <div style={fieldStyle}><input placeholder="What are you brewing?" value={beanName} onChange={e=>setBean(e.target.value)} style={{ fontSize:13, color:G.text }} /></div>
            </div>
            <div style={{ marginBottom:10 }}>
              <div style={labelStyle}>Method</div>
              <div style={fieldStyle}><input placeholder="V60, Espresso, Chemex…" value={method} onChange={e=>setMethod(e.target.value)} style={{ fontSize:13, color:G.text }} /></div>
            </div>
          </>
        )}
        <div style={{ marginBottom:14 }}>
          <div style={labelStyle}>Quick Rating</div>
          <RatingSquares n={rating} size={20} onChange={setRating} />
        </div>
        <div onClick={()=>onExpand(type,{cafeName,drinkType,beanName,method,rating})}
          style={{ textAlign:'center', padding:'8px 0', borderTop:'0.5px solid '+P.cardStroke, marginBottom:10, cursor:'pointer' }}>
          <span style={{ fontSize:10, color:P.cafe, fontFamily:'DM Mono, monospace' }}>+ add more details</span>
        </div>
        <div onClick={handleSave} style={{ background:P.cafe, borderRadius:10, padding:'13px',
          textAlign:'center', marginBottom:12, cursor:'pointer',

// ── Stats ─────────────────────────────────────────────────────────────────────
function StatsDash({ entries, onTab, onAdd }) {
  const [period, setPeriod] = useState('month');
  const now = new Date();
  const subset = period==='month'
    ? entries.filter(e=>{ const d=new Date(e.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); })
    : entries;
  const cafe  = subset.filter(e=>e.type==='cafe');
  const brews = subset.filter(e=>e.type==='brew');
  const rats  = subset.filter(e=>e.rating>0).map(e=>e.rating);
  const avg   = rats.length ? (rats.reduce((a,b)=>a+b,0)/rats.length).toFixed(1) : '—';

  const barData = Array.from({length:16},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(15-i));
    return entries.filter(e=>e.date.startsWith(d.toISOString().slice(0,10))).length;
  });
  const maxBar = Math.max(...barData,1);

  const methodMap = {};
  brews.forEach(e=>{ const m=e.method||'Other'; methodMap[m]=(methodMap[m]||0)+1; });
  const topMethods = Object.entries(methodMap).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([m,c])=>({ m, p:Math.round((c/(brews.length||1))*100) }));

  const stats = [
    { l:'Total Coffees', v:String(subset.length), s:period==='month'?'this month':'all time' },
    { l:'Avg Rating',    v:avg,                    s:'out of 5' },
    { l:'Cafés Visited', v:String(cafe.length),    s:'café visits' },
    { l:'Home Brews',    v:String(brews.length),   s:period==='month'?'this month':'all time' },
  ];

  const d1=new Date(); d1.setDate(d1.getDate()-15);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden' }}>
      <div style={{ padding:'18px 16px 12px', paddingTop:'calc(18px + env(safe-area-inset-top))' }}>
        <div style={{ fontSize:28, fontWeight:500, color:P.headerText, fontFamily:'Cormorant Garamond, serif', lineHeight:1 }}>Insights</div>
        <div style={{ display:'inline-flex', marginTop:12, background:P.cardBg,
          border:'0.5px solid '+P.cardStroke, borderRadius:20, padding:3, gap:2 }}>
          {[['month','This Month'],['all','All Time']].map(([val,lbl])=>(
            <div key={val} onClick={()=>setPeriod(val)} style={{ fontFamily:'DM Mono, monospace', fontSize:9,
              padding:'4px 12px', borderRadius:16, cursor:'pointer', transition:'all 0.15s',
              background: period===val?P.cardBg2:'transparent',
              color: period===val?P.headerText:P.headerMuted }}>{lbl}</div>
          ))}
        </div>
      </div>
      <div className="scroll-y" style={{ flex:1, padding:'0 16px 8px' }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8 }}>
          {stats.map((s,i)=>(
            <div key={i} style={{ background:P.cardBg2, border:'0.5px solid '+P.cardStroke, borderRadius:14, padding:'12px 13px' }}>
              <div style={{ fontSize:8, color:P.headerMuted, fontFamily:'DM Mono, monospace', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:5 }}>{s.l}</div>
              <div style={{ fontSize:30, fontWeight:400, color:P.headerText, fontFamily:'Cormorant Garamond, serif', lineHeight:1 }}>{s.v}</div>
              <div style={{ fontSize:9, color:P.headerMuted, fontFamily:'DM Mono, monospace', fontWeight:300, marginTop:3 }}>{s.s}</div>
            </div>
          ))}
        </div>
        <div style={{ background:P.cardBg, border:'0.5px solid '+P.cardStroke, borderRadius:14, padding:'12px 13px', marginBottom:8 }}>
          <div style={{ fontSize:8, color:P.headerMuted, fontFamily:'DM Mono, monospace', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:10 }}>Coffees per day</div>
          <div style={{ display:'flex', alignItems:'flex-end', gap:3, height:56 }}>
            {barData.map((v,i)=>(
              <div key={i} style={{ flex:1, height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end' }}>
                <div style={{ width:'100%', borderRadius:'2px 2px 0 0',
                  height: v===0?3:`${(v/maxBar)*100}%`, opacity:v===0?0.3:1,
                  background: i===barData.length-1?P.cafe:P.cardBg2,
                  border:'0.5px solid '+(i===barData.length-1?P.cafe:P.cardStroke) }} />
              </div>
            ))}
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', marginTop:6 }}>
            <span style={{ fontSize:8, color:P.headerMuted, fontFamily:'DM Mono, monospace' }}>{fmt(d1)}</span>
            <span style={{ fontSize:8, color:P.headerMuted, fontFamily:'DM Mono, monospace' }}>{fmt(now)}</span>
          </div>
        </div>
        {topMethods.length>0 && (
          <div style={{ background:P.cardBg, border:'0.5px solid '+P.cardStroke, borderRadius:14, padding:'12px 13px', marginBottom:8 }}>
            <div style={{ fontSize:8, color:P.headerMuted, fontFamily:'DM Mono, monospace', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:10 }}>Top Brew Methods</div>
            {topMethods.map((r,i)=>(
              <div key={i} style={{ marginBottom: i<topMethods.length-1?10:0 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4 }}>
                  <span style={{ fontSize:10, color:P.headerMuted, fontFamily:'DM Mono, monospace' }}>{r.m}</span>
                  <span style={{ fontSize:9, color:P.headerMuted, fontFamily:'DM Mono, monospace' }}>{r.p}%</span>
                </div>
                <div style={{ height:4, borderRadius:3, background:P.cardBg2 }}>
                  <div style={{ width:r.p+'%', height:'100%', borderRadius:3, background:i===0?P.cafe:P.brew, transition:'width 0.3s' }} />
                </div>
              </div>
            ))}
          </div>
        )}
        <div style={{ height:16 }} />
      </div>
      <TabBar active={3} onTab={onTab} onAdd={onAdd} />
    </div>
  );
}

          ))}
        </div>
        <div style={{ background:P.cardBg, border:'0.5px solid '+P.cardStroke, borderRadius:14, padding:'12px 14px', marginBottom:8 }}>
          <div style={{ fontSize:8, color:P.headerMuted, fontFamily:'DM Mono, monospace', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:8 }}>About</div>
          <div style={{ fontSize:12, color:G.text, fontFamily:'DM Mono, monospace', fontWeight:300, lineHeight:1.6 }}>
            Track coffee experiences, at home or outside. Log cafés, home brews, tasting notes, and brew parameters — all in one place.
          </div>
        </div>
        <div style={{ height:16 }} />
      </div>
      <TabBar active={4} onTab={onTab} onAdd={onAdd} />
    </div>
  );
}

// ── Detail helpers ────────────────────────────────────────────────────────────
function DetailRow({ label, value }) {
  if (!value) return null;
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ fontSize:8.5, color:G.label, fontFamily:'DM Mono, monospace',
        marginBottom:3, letterSpacing:'0.1em', textTransform:'uppercase' }}>{label}</div>
      <div style={{ fontSize:13, color:G.text, fontFamily:'DM Mono, monospace', fontWeight:300, lineHeight:1.5 }}>{value}</div>
    </div>
  );
}

function BeanPicker({ beans=[], value='', onChange }) {
  const [open, setOpen] = useState(false);
  const [customMode, setCustomMode] = useState(beans.length===0 || (!!value && !beans.some(b=>b.name===value)));
  if (customMode || beans.length===0) return (
    <div style={{ marginBottom:12 }}>
      <div style={{ fontSize:8.5, color:G.label, fontFamily:'DM Mono, monospace',
        marginBottom:5, letterSpacing:'0.1em', textTransform:'uppercase' }}>Bean Name</div>
      <div style={{ height:42, background:G.surface, border:'1px solid '+G.border,
        borderRadius:10, display:'flex', alignItems:'center', padding:'0 14px' }}>
        <input placeholder="Enter bean name…" value={value}
          onChange={e=>onChange(e.target.value)} style={{ fontSize:12, color:G.text }} />
      </div>
      {beans.length>0 && (
        <div onClick={()=>{ setCustomMode(false); onChange(''); }}
          style={{ fontSize:9, color:P.cafe, marginTop:5, fontFamily:'DM Mono, monospace', cursor:'pointer' }}>
          ← choose from saved beans
        </div>
      )}
    </div>
  );
  return (
    <div style={{ marginBottom:12 }}>
      <div style={{ fontSize:8.5, color:G.label, fontFamily:'DM Mono, monospace',
        marginBottom:5, letterSpacing:'0.1em', textTransform:'uppercase' }}>Bean Name</div>
      <div onClick={()=>setOpen(o=>!o)} style={{ height:42, background:G.surface,
        border:'1px solid '+(open?P.cafe:G.border),
        borderRadius: open ? '10px 10px 0 0' : 10,
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'0 14px', cursor:'pointer' }}>
        <span style={{ fontSize:12, color:value?G.text:G.placeholder,
          fontFamily:'DM Mono, monospace', fontWeight:300 }}>{value||'Select a bean…'}</span>
        <span style={{ fontSize:9, color:G.label }}>{open?'▲':'▼'}</span>
      </div>
      {open && (
        <div style={{ background:G.surface, border:'1px solid '+P.cafe,
          borderTop:'none', borderRadius:'0 0 10px 10px', overflow:'hidden' }}>
          {beans.map(b=>(
            <div key={b.id} onClick={()=>{ onChange(b.name); setOpen(false); }}
              style={{ padding:'10px 14px', borderBottom:'0.5px solid '+G.border,
                cursor:'pointer', background:b.name===value?'rgba(212,151,106,0.12)':'transparent',
                display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div>
                <div style={{ fontSize:12, color:G.text, fontFamily:'DM Mono, monospace', fontWeight:300 }}>{b.name}</div>
                {b.roaster && <div style={{ fontSize:9, color:G.label, fontFamily:'DM Mono, monospace', fontWeight:300 }}>{b.roaster}</div>}
              </div>
              {b.name===value && <span style={{ fontSize:9, color:P.cafe }}>✓</span>}
            </div>
          ))}
          <div onClick={()=>{ setCustomMode(true); setOpen(false); onChange(''); }}
            style={{ padding:'10px 14px', cursor:'pointer' }}>
            <span style={{ fontSize:11, color:P.cafe, fontFamily:'DM Mono, monospace' }}>+ enter new bean name</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Entry Detail ──────────────────────────────────────────────────────────────
function EntryDetail({ entry, onBack, onEdit }) {
  const isBrew = entry.type === 'brew';
  const title = isBrew ? (entry.beanName||'Unnamed Brew') : (entry.cafeName||'Unnamed Café');
  const dateStr = new Date(entry.date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden', background:P.bg }}>
      <div style={{ padding:'8px 16px', paddingTop:'calc(8px + env(safe-area-inset-top))',
        display:'flex', justifyContent:'space-between', alignItems:'center',
        borderBottom:'0.5px solid rgba(240,228,204,0.15)', background:P.bg, flexShrink:0 }}>
        <div onClick={onBack} style={{ fontSize:11, color:P.cafe, cursor:'pointer', padding:'4px 0' }}>← Back</div>
        <div style={{ fontSize:13, fontWeight:500, color:G.text,
          fontFamily:'Cormorant Garamond, serif', letterSpacing:'0.04em' }}>
          {isBrew ? 'Home Brew' : 'Café Visit'}
        </div>
        <div onClick={onEdit} style={{ fontSize:11, color:P.cafe, fontWeight:600, cursor:'pointer', padding:'4px 0' }}>Edit</div>
      </div>
      <div className="scroll-y" style={{ flex:1, padding:'16px' }}>
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:24, fontWeight:500, color:P.headerText,
            fontFamily:'Cormorant Garamond, serif', lineHeight:1.2 }}>{title}</div>
          {!isBrew && entry.location && <div style={{ fontSize:10, color:P.headerMuted, fontFamily:'DM Mono, monospace', fontWeight:300, marginTop:4 }}>{entry.location}</div>}
          {isBrew && entry.roaster && <div style={{ fontSize:10, color:P.headerMuted, fontFamily:'DM Mono, monospace', fontWeight:300, marginTop:4 }}>{entry.roaster}</div>}
          <div style={{ fontSize:9, color:P.headerMuted, fontFamily:'DM Mono, monospace', fontWeight:300, marginTop:6 }}>
            {dateStr} · {formatTime(entry.date)}
          </div>
        </div>
        {!isBrew && (
          <>
            {(entry.drinkType||entry.bean||entry.price) && (<><FormDivider /><SectionHead label="The Coffee" /><div style={{height:6}}/><DetailRow label="Drink" value={entry.drinkType} /><DetailRow label="Bean / Roaster" value={entry.bean} /><DetailRow label="Price" value={entry.price} /></>)}
            {entry.tastingNotes?.length>0 && (<><FormDivider /><SectionHead label="Tasting" /><div style={{height:6}}/><div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}}>{entry.tastingNotes.map(n=><GhostChip key={n} label={n} active />)}</div></>)}
            {entry.ratings && Object.values(entry.ratings).some(v=>v>0) && (
              <div style={{marginBottom:10}}>
                {['Overall','Aroma','Taste','Texture'].filter(r=>entry.ratings[r.toLowerCase()]>0).map(r=>(
                  <div key={r} style={{display:'flex',alignItems:'center',gap:12,marginBottom:6}}>
                    <span style={{fontSize:10,color:G.label,fontFamily:'DM Mono, monospace',width:54,flexShrink:0}}>{r}</span>
                    <RatingSquares n={entry.ratings[r.toLowerCase()]} size={14} />
                  </div>
                ))}
              </div>
            )}
            {(entry.vibeTags?.length>0||entry.wouldVisitAgain) && (<><FormDivider /><SectionHead label="Vibe" /><div style={{height:6}}/>
              {entry.vibeTags?.length>0 && <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}}>{entry.vibeTags.map(t=><GhostChip key={t} label={t} active />)}</div>}
              {entry.wouldVisitAgain && <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><div style={{width:16,height:16,borderRadius:4,background:P.cafe,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:10,color:'#182635'}}>✓</span></div><span style={{fontSize:12,color:G.text,fontFamily:'DM Mono, monospace',fontWeight:300}}>Would visit again</span></div>}
            </>)}
          </>
        )}
        {isBrew && (
          <>
            <FormDivider />
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:G.label,fontFamily:'DM Mono, monospace',marginBottom:6,letterSpacing:'0.1em',textTransform:'uppercase'}}>Method</div>
              {entry.method && <div style={{display:'inline-block'}}><GhostChip label={entry.method} active /></div>}
            </div>
            {(entry.dose||entry.water||entry.temp||entry.brewTime||entry.grindSize||entry.ratio) && (
              <><FormDivider /><SectionHead label="Parameters" /><div style={{height:6}}/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  {[['Dose',entry.dose],['Water',entry.water],['Temp',entry.temp],['Time',entry.brewTime],['Grind',entry.grindSize],['Ratio',entry.ratio]].filter(([,v])=>v).map(([l,v])=>(
                    <div key={l}>
                      <div style={{fontSize:8,color:G.label,fontFamily:'DM Mono, monospace',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:2}}>{l}</div>
                      <div style={{fontSize:13,color:G.text,fontFamily:'DM Mono, monospace',fontWeight:300}}>{v}</div>
                    </div>
                  ))}
                </div>
              </>
            )}
            {entry.tastingNotes?.length>0 && (<><FormDivider /><SectionHead label="Tasting" /><div style={{height:6}}/><div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}}>{entry.tastingNotes.map(n=><GhostChip key={n} label={n} active />)}</div></>)}
            {entry.rating>0 && <div style={{marginBottom:10}}><div style={{fontSize:9,color:G.label,fontFamily:'DM Mono, monospace',marginBottom:6,letterSpacing:'0.1em',textTransform:'uppercase'}}>Rating</div><RatingSquares n={entry.rating} size={16} /></div>}
          </>
        )}
        {(entry.notes||entry.whatIdChange||entry.recipe) && (
          <><FormDivider /><SectionHead label="Notes" /><div style={{height:6}}/>
            {entry.notes && <div style={{fontSize:12,color:G.text,fontFamily:'DM Mono, monospace',fontWeight:300,lineHeight:1.6,marginBottom:10}}>{entry.notes}</div>}
            <DetailRow label="What I'd Change" value={entry.whatIdChange} />
            <DetailRow label="Recipe / Steps" value={entry.recipe} />
          </>
        )}
        <div style={{height:32}} />
      </div>
    </div>
  );
}

// ── Bean Detail ───────────────────────────────────────────────────────────────
function BeanDetail({ bean, onBack, onEdit }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden', background:P.bg }}>
      <div style={{ padding:'8px 16px', paddingTop:'calc(8px + env(safe-area-inset-top))',
        display:'flex', justifyContent:'space-between', alignItems:'center',
        borderBottom:'0.5px solid rgba(240,228,204,0.15)', background:P.bg, flexShrink:0 }}>
        <div onClick={onBack} style={{ fontSize:11, color:P.cafe, cursor:'pointer', padding:'4px 0' }}>← Back</div>
        <div style={{ fontSize:13, fontWeight:500, color:G.text, fontFamily:'Cormorant Garamond, serif' }}>Bean Detail</div>
        <div onClick={onEdit} style={{ fontSize:11, color:P.cafe, fontWeight:600, cursor:'pointer', padding:'4px 0' }}>Edit</div>
      </div>
      <div className="scroll-y" style={{ flex:1, padding:'16px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:20 }}>
          <BeanAvatar color={bean.color||'#6B8FA8'} />
          <div>
            <div style={{ fontSize:22, fontWeight:500, color:P.headerText, fontFamily:'Cormorant Garamond, serif', lineHeight:1.2 }}>{bean.name}</div>
            {bean.roaster && <div style={{ fontSize:10, color:P.headerMuted, fontFamily:'DM Mono, monospace', fontWeight:300, marginTop:4 }}>{bean.roaster}</div>}
          </div>
        </div>
        <FormDivider />
        <div style={{ display:'flex', gap:8, marginBottom:14 }}>
          <GhostChip label={bean.process||'Washed'} active />
        </div>
        {bean.rating>0 && (
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:9, color:G.label, fontFamily:'DM Mono, monospace', marginBottom:6, letterSpacing:'0.1em', textTransform:'uppercase' }}>Rating</div>
            <RatingSquares n={bean.rating} size={18} />
          </div>
        )}
        <FormDivider />
        <DetailRow label="Times Brewed" value={`${bean.brews} brew${bean.brews!==1?'s':''}`} />
        <div style={{ height:32 }} />
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [entries, setEntries]       = useLS('coffee_entries', []);
  const [beans,   setBeans]         = useLS('coffee_beans',   []);
  const [view,    setView]          = useState('home');
  const [showSheet, setSheet]       = useState(false);
  const [formInit,  setInit]        = useState({});
  const [selectedEntry, setSelEntry]= useState(null);
  const [selectedBean,  setSelBean] = useState(null);

  const goTab = t => { setSheet(false); setView(['home','beans',null,'stats','profile'][t]); };

  const saveEntry = entry => { setEntries([entry,...entries]); setSheet(false); setView('home'); };

  const updateEntry = entry => {
    setEntries(prev => prev.map(e => e.id===entry.id ? entry : e));
    setSelEntry(entry);
    setView('entry-detail');
  };

  const updateBean = bean => {
    setBeans(prev => prev.map(b => b.id===bean.id ? bean : b));
    setSelBean(bean);
    setView('bean-detail');
  };

  const expand = (type, partial) => { setInit(partial); setSheet(false); setView(type==='cafe'?'cafe-form':'brew-form'); };

  const sp = { onTab:goTab, onAdd:()=>setSheet(true) };

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', overflow:'hidden', background:P.bg }}>
      {view==='home'         && <HomeScreen    entries={entries} {...sp} onEntryPress={e=>{ setSelEntry(e); setView('entry-detail'); }} />}
      {view==='beans'        && <BeanLibrary   beans={beans} {...sp} onAddBean={()=>setView('add-bean')} onBeanPress={b=>{ setSelBean(b); setView('bean-detail'); }} />}
      {view==='stats'        && <StatsDash     entries={entries} {...sp} />}
      {view==='profile'      && <ProfileScreen entries={entries} beans={beans} {...sp} />}
      {view==='entry-detail' && selectedEntry && <EntryDetail entry={selectedEntry} onBack={()=>setView('home')} onEdit={()=>{ setInit(selectedEntry); setView(selectedEntry.type==='cafe'?'cafe-form-edit':'brew-form-edit'); }} />}
      {view==='bean-detail'  && selectedBean  && <BeanDetail  bean={selectedBean}  onBack={()=>setView('beans')} onEdit={()=>{ setInit(selectedBean); setView('bean-form-edit'); }} />}
      {view==='cafe-form'    && <CafeForm  initial={formInit} onBack={()=>setView('home')}         onSave={saveEntry} />}
      {view==='brew-form'    && <BrewForm  initial={formInit} onBack={()=>setView('home')}         onSave={saveEntry}   beans={beans} />}
      {view==='cafe-form-edit'&& <CafeForm initial={formInit} onBack={()=>setView('entry-detail')} onUpdate={updateEntry} />}
      {view==='brew-form-edit'&& <BrewForm initial={formInit} onBack={()=>setView('entry-detail')} onUpdate={updateEntry} beans={beans} />}
      {view==='add-bean'     && <AddBeanForm onBack={()=>setView('beans')} onSave={b=>{ setBeans([b,...beans]); setView('beans'); }} />}
      {view==='bean-form-edit'&& <AddBeanForm initial={formInit} onBack={()=>setView('bean-detail')} onUpdate={updateBean} />}
      {showSheet && <QuickCaptureSheet onClose={()=>setSheet(false)} onSave={saveEntry} onExpand={expand} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
